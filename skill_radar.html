<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06070d; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 900, H = 500;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

const cx = 330, cy = 250;
const maxR = 200;

const axes = [
  { label: 'AI / ML', angle: -Math.PI / 2 },
  { label: 'Product Strategy', angle: -Math.PI / 2 + (2 * Math.PI / 6) },
  { label: 'Data Engineering', angle: -Math.PI / 2 + 2 * (2 * Math.PI / 6) },
  { label: 'User Research', angle: -Math.PI / 2 + 3 * (2 * Math.PI / 6) },
  { label: 'System Design', angle: -Math.PI / 2 + 4 * (2 * Math.PI / 6) },
  { label: 'Growth & GTM', angle: -Math.PI / 2 + 5 * (2 * Math.PI / 6) },
];

const profiles = [
  {
    name: 'Current',
    values: [0.92, 0.88, 0.85, 0.78, 0.90, 0.72],
    color: '#6ee7b7',
    fill: 'rgba(110,231,183,0.12)',
  },
  {
    name: 'Target',
    values: [0.95, 0.92, 0.90, 0.85, 0.92, 0.88],
    color: '#818cf8',
    fill: 'rgba(129,140,248,0.06)',
    dash: [6, 4],
  },
];

const milestones = [
  { axis: 0, dist: 0.65, label: 'RAG Systems', color: '#f472b6' },
  { axis: 0, dist: 0.85, label: 'LLM Orchestration', color: '#e879f9' },
  { axis: 1, dist: 0.75, label: 'OKR Design', color: '#93c5fd' },
  { axis: 2, dist: 0.70, label: 'Data Contracts', color: '#c4b5fd' },
  { axis: 2, dist: 0.55, label: 'Semantic Layer', color: '#86efac' },
  { axis: 3, dist: 0.60, label: 'JTBD Framework', color: '#fbbf24' },
  { axis: 4, dist: 0.80, label: 'HITL Design', color: '#38bdf8' },
  { axis: 4, dist: 0.60, label: 'Guardrails', color: '#fb923c' },
  { axis: 5, dist: 0.55, label: 'PLG Motions', color: '#f87171' },
];

let frame = 0;
function draw() {
  frame++;
  ctx.fillStyle = '#06070d';
  ctx.fillRect(0, 0, W, H);

  const grad = ctx.createRadialGradient(cx, cy, 20, cx, cy, maxR + 100);
  grad.addColorStop(0, 'rgba(99,102,241,0.04)');
  grad.addColorStop(1, 'rgba(6,7,13,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const rings = [0.25, 0.5, 0.75, 1.0];
  rings.forEach(r => {
    ctx.beginPath();
    for (let i = 0; i <= axes.length; i++) {
      const a = axes[i % axes.length].angle;
      const x = cx + Math.cos(a) * maxR * r;
      const y = cy + Math.sin(a) * maxR * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(148,163,184,${r === 1 ? 0.15 : 0.08})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  axes.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a.angle) * maxR, cy + Math.sin(a.angle) * maxR);
    ctx.strokeStyle = 'rgba(148,163,184,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();

    const labelR = maxR + 24;
    const lx = cx + Math.cos(a.angle) * labelR;
    const ly = cy + Math.sin(a.angle) * labelR;
    ctx.fillStyle = '#94a3b8';
    ctx.font = '500 11px "SF Pro Display", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (a.angle > -0.1 && a.angle < 0.1) ctx.textAlign = 'left';
    else if (Math.abs(a.angle) > Math.PI - 0.3) ctx.textAlign = 'right';

    ctx.fillText(a.label, lx, ly);
  });

  profiles.forEach(profile => {
    ctx.beginPath();
    const pts = [];
    for (let i = 0; i <= axes.length; i++) {
      const idx = i % axes.length;
      const a = axes[idx].angle;
      const v = profile.values[idx];
      const animV = v * Math.min(1, frame / 60);
      const x = cx + Math.cos(a) * maxR * animV;
      const y = cy + Math.sin(a) * maxR * animV;
      pts.push({ x, y });
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    if (profile.dash) {
      ctx.setLineDash(profile.dash);
    } else {
      ctx.setLineDash([]);
    }

    ctx.fillStyle = profile.fill;
    ctx.fill();
    ctx.strokeStyle = profile.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);

    if (!profile.dash) {
      pts.slice(0, -1).forEach((p, i) => {
        const pulse = 1 + 0.15 * Math.sin(frame * 0.03 + i);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = profile.color;
        ctx.fill();

        const glow = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, 12);
        glow.addColorStop(0, profile.color.replace(')', ',0.4)').replace('rgb', 'rgba'));
        const r = parseInt(profile.color.slice(1, 3), 16);
        const g = parseInt(profile.color.slice(3, 5), 16);
        const b = parseInt(profile.color.slice(5, 7), 16);
        glow.addColorStop(0, `rgba(${r},${g},${b},0.4)`);
        glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  });

  const animProgress = Math.min(1, frame / 80);
  milestones.forEach((m, mi) => {
    const a = axes[m.axis].angle;
    const spread = (mi % 2 === 0 ? 0.12 : -0.12);
    const angle = a + spread;
    const d = m.dist * animProgress;
    const x = cx + Math.cos(angle) * maxR * d;
    const y = cy + Math.sin(angle) * maxR * d;

    const r = parseInt(m.color.slice(1, 3), 16);
    const g = parseInt(m.color.slice(3, 5), 16);
    const b = parseInt(m.color.slice(5, 7), 16);
    const pulse = 0.6 + 0.4 * Math.abs(Math.sin(frame * 0.02 + mi * 0.7));

    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${pulse})`;
    ctx.fill();

    const glow = ctx.createRadialGradient(x, y, 1, x, y, 8);
    glow.addColorStop(0, `rgba(${r},${g},${b},${pulse * 0.3})`);
    glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fill();
  });

  // Legend area on the right
  const legendX = 640, legendY = 60;
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '700 18px "SF Pro Display", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Skill Constellation', legendX, legendY);

  ctx.fillStyle = '#64748b';
  ctx.font = '400 12px "SF Pro Display", system-ui, sans-serif';
  ctx.fillText('Competency mapping across product domains', legendX, legendY + 22);

  // Profile legend
  const ly0 = legendY + 60;
  profiles.forEach((p, i) => {
    const y = ly0 + i * 28;
    ctx.beginPath();
    if (p.dash) {
      ctx.setLineDash(p.dash);
    }
    ctx.moveTo(legendX, y);
    ctx.lineTo(legendX + 24, y);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#cbd5e1';
    ctx.font = '500 12px "SF Pro Display", system-ui, sans-serif';
    ctx.fillText(p.name, legendX + 32, y + 4);
  });

  // Milestones legend
  const mly = ly0 + 80;
  ctx.fillStyle = '#94a3b8';
  ctx.font = '600 11px "SF Pro Display", system-ui, sans-serif';
  ctx.fillText('KEY SKILLS', legendX, mly);

  milestones.forEach((m, i) => {
    const col = Math.floor(i / 5);
    const row = i % 5;
    const mx = legendX + col * 130;
    const my = mly + 20 + row * 22;

    ctx.beginPath();
    ctx.arc(mx + 5, my - 3, 3, 0, Math.PI * 2);
    ctx.fillStyle = m.color;
    ctx.fill();

    ctx.fillStyle = '#94a3b8';
    ctx.font = '400 11px "SF Pro Display", system-ui, sans-serif';
    ctx.fillText(m.label, mx + 14, my);
  });

  // Bottom stats
  const statsY = 440;
  const stats = [
    { label: '7+', sub: 'Years Experience' },
    { label: '4', sub: 'Enterprise Orgs' },
    { label: 'M.S.', sub: 'CS @ Georgia Tech' },
    { label: '0→1', sub: 'Builder Mindset' },
  ];
  stats.forEach((s, i) => {
    const sx = legendX + i * 65;
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '700 16px "SF Pro Display", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.label, sx + 20, statsY);
    ctx.fillStyle = '#64748b';
    ctx.font = '400 9px "SF Pro Display", system-ui, sans-serif';
    ctx.fillText(s.sub, sx + 20, statsY + 14);
  });
  ctx.textAlign = 'left';

  if (frame < 120) requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
